services:
  - type: web
    name: lucerne-boutique
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npx tsx script/migrate-render.ts && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
